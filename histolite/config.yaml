name: "HistoLite"
description: >
  Gestione intelligente della storia dei sensori Home Assistant.
  Analizza i sensori con più dati registrati e applica strategie di
  purge mirato o appiattimento statistico per alleggerire il database SQLite.
version: "1.0.0"
slug: "histolite"
init: false
homeassistant_api: false
auth_api: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:database-clock"
panel_title: "HistoLite"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

options:
  db_path: "/homeassistant/home-assistant_v2.db"
  backup_before_purge: true
  backup_path: "/backup"
  log_level: "info"
  max_rows_per_batch: 5000

schema:
  db_path: str
  backup_before_purge: bool
  backup_path: str
  log_level: list(debug|info|warning|error)
  max_rows_per_batch: int

map:
  - homeassistant:rw
  - backup:rw
  - data:rw
  - ssl:ro

ports:
  8099/tcp: null

ports_description:
  8099/tcp: "Interfaccia web HistoLite (Ingress)"
